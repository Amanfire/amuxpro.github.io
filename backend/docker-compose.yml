version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: amux_user
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: amux_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://amux_user:CHANGE_ME@db:5432/amux_db
    ports:
      - "8000:8000"

volumes:
  pgdata:
